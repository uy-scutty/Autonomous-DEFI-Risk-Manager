[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
solc_version   = "0.8.20"
optimizer      = true
optimizer_runs = 200
via_ir         = false

# Arbitrum fork for tests
[rpc_endpoints]
arbitrum      = "${ARBITRUM_RPC_URL}"
arbitrum_sep  = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs   = 64
depth  = 15

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
